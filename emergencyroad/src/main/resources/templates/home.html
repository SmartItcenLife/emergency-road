<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>응급의료 추천</title>

    <style>
        body {
            margin: 0;
            background: #f5f7fb;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            border-radius: 20px;
            padding: 28px 22px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            box-sizing: border-box;
        }

        .title {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            color: #111827;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 14px;
            line-height: 1.5;
            color: #6b7280;
        }

        .info-box {
            margin-top: 18px;
            padding: 14px;
            border-radius: 12px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            font-size: 13px;
            color: #2563eb;
            line-height: 1.5;
        }

        .button-group {
            margin-top: 26px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .recommend-button {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .recommend-button:hover {
            transform: translateY(-1px);
        }

        .recommend-button:active {
            transform: scale(0.98);
        }

        .pediatric {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .general {
            background: #dcfce7;
            color: #15803d;
        }

        .pregnant {
            background: #fce7f3;
            color: #be185d;
        }

        .geo-message {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
        }

        .emoji {
            font-size: 20px;
            margin-right: 6px;
        }
    </style>
</head>

<body>

<div class="page">

    <div class="container">

        <h1 class="title">응급의료 추천</h1>

        <p class="subtitle">
            현재 위치를 기반으로 가까운 응급 병원을 추천해드립니다.
        </p>

        <div class="info-box">
            📍 정확한 추천을 위해 위치 권한 허용이 필요합니다.
        </div>

        <form id="recommendForm" action="/recommend/rank" method="get">

            <input type="hidden" name="category" id="categoryInput">
            <input type="hidden" name="lat" id="latInput">
            <input type="hidden" name="lon" id="lonInput">

            <div class="button-group">

                <button type="button"
                        class="recommend-button pediatric"
                        onclick="getLocation('PEDIATRIC')">
                    <span class="emoji">🧒</span>
                    소아 응급 추천
                </button>

                <button type="button"
                        class="recommend-button general"
                        onclick="getLocation('GENERAL')">
                    <span class="emoji">🚑</span>
                    일반 응급 추천
                </button>

                <button type="button"
                        class="recommend-button pregnant"
                        onclick="getLocation('PREGNANT')">
                    <span class="emoji">🤰</span>
                    임산부 응급 추천
                </button>

            </div>

            <p id="geoMessage" class="geo-message">
                병원 추천을 위해 현재 위치 정보가 필요합니다.
            </p>

        </form>

    </div>

</div>

<script>

    function getLocation(category) {

        document.getElementById('geoMessage').innerText =
            "📍 위치 정보를 요청 중입니다... 브라우저에서 허용해주세요.";

        if (navigator.geolocation) {

            navigator.geolocation.getCurrentPosition(

                function(position) {

                    document.getElementById('categoryInput').value = category;
                    document.getElementById('latInput').value = position.coords.latitude;
                    document.getElementById('lonInput').value = position.coords.longitude;

                    document.getElementById('recommendForm').submit();
                },

                function(error) {

                    document.getElementById('geoMessage').innerText =
                        "위치 권한이 거부되었습니다. 설정에서 허용해주세요.";

                    console.log(error.code);
                    console.log(error.message);
                }

            );

        } else {

            alert("이 브라우저는 위치 정보를 지원하지 않습니다.");
        }
    }

</script>

</body>
</html>
