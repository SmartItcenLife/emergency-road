<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일반 응급 병원 목록</title>
    <style>
        body {
            margin: 0;
            background: #f5f7fb;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .page {
            width: 100%;
            min-height: 100vh;
            background: #f8fafc;
            padding: 14px;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .page {
                max-width: 430px;
                margin: 0 auto;
            }
        }

        .header {
            margin-bottom: 16px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px;
        }

        .location {
            font-size: 13px;
            color: #2563eb;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 18px 0 10px;
        }

        .hospital-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hospital-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        .hospital-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .hospital-icon {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            background: #e0f2fe;
            color: #0284c7;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex: 0 0 auto;
        }

        .hospital-info {
            min-width: 0;
            flex: 1;
        }

        .hospital-name {
            font-size: 15px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 190px;
        }

        .hospital-meta {
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
            flex-wrap: wrap;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-free {
            background: #dcfce7;
            color: #16a34a;
        }

        .badge-normal {
            background: #fef3c7;
            color: #d97706;
        }

        .badge-busy {
            background: #fee2e2;
            color: #dc2626;
        }

        .badge-unknown {
            background: #e5e7eb;
            color: #6b7280;
        }

        .hospital-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .call-button,
        .route-button,
        .community-button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #eff6ff;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: 1px solid #bfdbfe;
            flex: 0 0 auto;
        }

        .call-icon-img,
        .finder-icon-img,
        .community-icon-img {
            width: 14px;
            height: 14px;
        }

        .call-button-disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .hospital-actions {
            display: flex;
            flex-direction: row;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        .hospital-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .donut {
            --rate: 0;
            --donut-color: #9ca3af;

            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(var(--donut-color) calc(var(--rate) * 1%), #e5e7eb 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .donut-free {
            --donut-color: #22c55e;
        }

        .donut-normal {
            --donut-color: #facc15;
        }

        .donut-busy {
            --donut-color: #ef4444;
        }

        .donut-unknown {
            --donut-color: #9ca3af;
        }

        .donut::before {
            content: "";
            position: absolute;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #ffffff;
        }

        .donut span {
            position: relative;
            font-size: 11px;
            font-weight: 800;
            color: var(--donut-color);
        }

        .bed-text {
            font-size: 10px;
            color: #6b7280;
            text-align: center;
            white-space: nowrap;
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: #6b7280;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
<div class="page">
    <header class="header">
        <h1 class="title">일반 응급 병원 목록</h1>
        <div class="location">
            <span th:text="${locationProvided ? '현재 위치' : '기본 위치'}">현재 위치</span>
            :
            <span th:text="${displayLocation}"></span>
        </div>
    </header>

    <section>
        <h2 class="section-title">전체 병원 목록</h2>

        <div class="empty" th:if="${#lists.isEmpty(hospitals)}">
            표시할 병원 정보가 없습니다.
        </div>

        <div class="hospital-list" th:unless="${#lists.isEmpty(hospitals)}">
            <article class="hospital-card" th:each="hospital : ${hospitals}">
                <div class="hospital-left">
                    <div class="hospital-icon">H</div>

                    <div class="hospital-info">
                        <div class="hospital-name" th:text="${hospital.hospitalName}">
                            한양대병원
                        </div>

                        <div class="hospital-meta">
                            <span th:text="${hospital.distanceKm != null ? hospital.distanceKm + 'km' : '-'}">
                                2.6km
                            </span>

                            <span class="badge"
                                  th:classappend="${hospital.congestionLabel == '여유'} ? ' badge-free' :
                                                  (${hospital.congestionLabel == '보통'} ? ' badge-normal' :
                                                  (${hospital.congestionLabel == '혼잡'} ? ' badge-busy' : ' badge-unknown'))"
                                  th:text="${hospital.congestionLabel}">
                                보통
                            </span>

                            <span>응급실 병상 정보 제공</span>
                        </div>
                    </div>
                </div>

                <div class="hospital-right">
                    <div class="hospital-status">
                        <div class="donut"
                             th:classappend="${hospital.congestionLabel == '여유'} ? ' donut-free' :
                                            (${hospital.congestionLabel == '보통'} ? ' donut-normal' :
                                            (${hospital.congestionLabel == '혼잡'} ? ' donut-busy' : ' donut-unknown'))"
                             th:style="|--rate: ${hospital.availableBedPercentage != null ? hospital.availableBedPercentage : 0}|">
                            <span th:text="${hospital.availableBedPercentage != null ? hospital.availableBedPercentage + '%' : '-'}">
                                28%
                            </span>
                        </div>

                        <div class="bed-text"
                             th:text="|가용 병상 ${hospital.availableEmergencyBedCount != null ? hospital.availableEmergencyBedCount : 0}개|">
                            가용 병상 2개
                        </div>

                        <div class="hospital-actions">
                            <a class="call-button"
                               th:href="${hospital.emergencyPhone != null ? 'tel:' + hospital.emergencyPhone : '#'}"
                               th:classappend="${hospital.emergencyPhone == null} ? ' call-button-disabled'">
                                <img th:src="@{/images/phone.svg}" class="call-icon-img" alt="전화걸기">
                            </a>

                            <a class="route-button"
                               href="#"
                               th:data-hospital-name="${hospital.hospitalName}"
                               th:data-lat="${hospital.hospitalLatitude}"
                               th:data-lon="${hospital.hospitalLongitude}">
                                <img th:src="@{/images/finder.svg}" class="finder-icon-img" alt="길찾기">
                            </a>

                            <a class="community-button"
                               th:href="@{/hospitals/{hpid}/posts(hpid=${hospital.hpid})}"
                               aria-label="커뮤니티 이동">
                                <img th:src="@{/images/community.svg}" class="community-icon-img" alt="커뮤니티">
                            </a>
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </section>
</div>

<script th:inline="javascript">
    const locationProvided = [[${locationProvided}]];

    if (!locationProvided && navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                window.location.href = `/general/hospitals?lat=${lat}&lon=${lon}`;
            },
            function() {
                console.log("위치 정보 제공이 거부되었습니다.");
            }
        );
    }

    const userLat = [[${userLat}]];
    const userLon = [[${userLon}]];

    document.querySelectorAll(".route-button").forEach(function(button) {
        button.addEventListener("click", function(e) {
            e.preventDefault();

            const hospitalName = button.dataset.hospitalName;
            const hospitalLat = button.dataset.lat;
            const hospitalLon = button.dataset.lon;

            if (!hospitalLat || !hospitalLon) {
                alert("병원 위치 정보가 없습니다");
                return;
            }

            const startName = encodeURIComponent("현재 위치");
            const endName = encodeURIComponent(hospitalName);

            const url =
                `https://map.kakao.com/link/by/car/${startName},${userLat},${userLon}/${endName},${hospitalLat},${hospitalLon}`;

            window.open(url, "_blank");
        });
    });
</script>
</body>
</html>
