<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title th:text="${post != null} ? '게시글 수정' : '게시글 작성'">게시글 작성</title>

  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
  >

  <style>
    body {
      margin: 0;
      background-color: #f8fafc;
      color: #111827;
    }

    .write-container {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 0 16px 96px;
      background-color: #ffffff;
    }

    .write-header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      background-color: #ffffff;
    }

    .header-title {
      font-size: 20px;
      font-weight: 900;
    }

    .header-btn {
      border: none;
      background: none;
      color: #111827;
      font-size: 28px;
      line-height: 1;
      padding: 0;
      text-decoration: none;
    }

    .header-submit {
      border: none;
      background: none;
      color: #0d6efd;
      font-size: 16px;
      font-weight: 800;
    }

    .write-card {
      margin-top: 8px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background-color: #ffffff;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .form-section {
      margin-bottom: 24px;
    }

    .form-section:last-child {
      margin-bottom: 0;
    }

    .form-label-custom {
      display: block;
      margin-bottom: 10px;
      color: #111827;
      font-size: 15px;
      font-weight: 800;
    }

    .title-input {
      height: 48px;
      border-radius: 12px;
      font-size: 15px;
    }

    .content-textarea {
      min-height: 190px;
      resize: vertical;
      border-radius: 14px;
      font-size: 15px;
      line-height: 1.6;
    }

    .text-count {
      margin-top: 6px;
      text-align: right;
      color: #6b7280;
      font-size: 13px;
    }

    .form-guide {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.5;
    }

    .guide-icon {
      color: #0d6efd;
      font-weight: 900;
    }

    .image-upload-area {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .image-upload-box {
      min-width: 112px;
      height: 112px;
      border: 1px dashed #bcd3ff;
      border-radius: 14px;
      background-color: #f8fbff;
      color: #0d6efd;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .camera-icon {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .image-input {
      display: none;
    }

    .current-image-list {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .current-image-item {
      position: relative;
      min-width: 112px;
      width: 112px;
      height: 112px;
      border-radius: 14px;
      overflow: hidden;
      background-color: #f3f4f6;
    }

    .current-image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .image-remove-mark {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.9);
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
    }

    .image-help {
      margin-top: 8px;
      color: #6b7280;
      font-size: 13px;
    }

    .error-message {
      margin-top: 8px;
      color: #dc2626;
      font-size: 13px;
    }

    .bottom-submit-bar {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      padding: 10px 16px 14px;
      border-top: 1px solid #e5e7eb;
      background-color: #ffffff;
    }

    .bottom-submit-button {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 900;
    }
  </style>
</head>

<body>

<form
    th:action="${post != null}
        ? @{/hospitals/{hpid}/posts/{postId}/edit(hpid=${hpid}, postId=${post.id})}
        : @{/hospitals/{hpid}/posts(hpid=${hpid})}"
    th:object="${postRequestDto}"
    method="post"
    enctype="multipart/form-data"
>

  <main class="write-container">

    <!-- 상단 헤더 -->
    <header class="write-header">
      <button type="button" class="header-btn" onclick="history.back()">←</button>

      <div
          class="header-title"
          th:text="${post != null} ? '글 수정' : '글쓰기'"
      >
        글쓰기
      </div>

      <button
          type="submit"
          class="header-submit"
          th:text="${post != null} ? '수정' : '등록'"
      >
        등록
      </button>
    </header>

    <!-- 에러 메시지 -->
    <div th:if="${errorMessage}" class="alert alert-danger mt-2" role="alert">
      <p th:text="${errorMessage}" class="mb-0"></p>
    </div>

    <section class="write-card">

      <!-- 제목 -->
      <div class="form-section">
        <label for="title" class="form-label-custom">제목</label>

        <input
            type="text"
            id="title"
            th:field="*{title}"
            class="form-control title-input"
            placeholder="제목을 입력해주세요"
            maxlength="100"
        >

        <div class="text-count">최대 100자</div>

        <p
            th:if="${#fields.hasErrors('title')}"
            th:errors="*{title}"
            class="error-message"
        ></p>
      </div>

      <!-- 내용 -->
      <div class="form-section">
        <label for="content" class="form-label-custom">내용</label>

        <textarea
            id="content"
            th:field="*{content}"
            class="form-control content-textarea"
            placeholder="진료 경험, 질문, 회복 팁 등을 자유롭게 작성해주세요."
            maxlength="2000"
        ></textarea>

        <div class="text-count">최대 2000자</div>

        <p
            th:if="${#fields.hasErrors('content')}"
            th:errors="*{content}"
            class="error-message"
        ></p>

        <div class="form-guide">
          <span class="guide-icon">✓</span>
          <span>서로를 배려하는 커뮤니티 문화를 위해 예의를 지켜주세요.</span>
        </div>
      </div>

      <!-- 사진 첨부 -->
      <div class="form-section">
        <label class="form-label-custom">사진 첨부</label>

        <div class="image-upload-area">

          <label for="images" class="image-upload-box">
            <span class="camera-icon">📷</span>
            <span>사진 추가</span>
          </label>

          <input
              type="file"
              id="images"
              name="images"
              class="image-input"
              accept="image/*"
              multiple
          >

          <!-- 새로 선택한 이미지 미리보기 -->
          <div id="newImagePreview" class="current-image-list"></div>

          <!-- 기존 이미지 표시 : 수정 시 -->
          <div
              class="current-image-list"
              th:if="${post != null && post.imageUrls != null && !post.imageUrls.isEmpty()}"
          >
            <div class="current-image-item" th:each="imageUrl : ${post.imageUrls}">
              <img th:src="${imageUrl}" alt="현재 이미지">
              <span class="image-remove-mark">×</span>
            </div>
          </div>

        </div>

        <div class="image-help">
          최대 3장까지 첨부 가능
        </div>
      </div>

    </section>

  </main>

  <!-- 하단 등록/수정 버튼 -->
  <div class="bottom-submit-bar">
    <button
        type="submit"
        class="btn btn-primary bottom-submit-button"
        th:text="${post != null} ? '게시글 수정' : '게시글 등록'"
    >
      게시글 등록
    </button>
  </div>

</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script>
  document.getElementById('images').addEventListener('change', function(e) {
    const preview = document.getElementById('newImagePreview');
    preview.innerHTML = '';  // 기존 미리보기 초기화

    const files = Array.from(e.target.files).slice(0, 3);  // 최대 3장

    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const div = document.createElement('div');
        div.className = 'current-image-item';
        div.innerHTML = `
                <img src="${e.target.result}" alt="미리보기">
                <span class="image-remove-mark">×</span>
            `;
        preview.appendChild(div);
      };
      reader.readAsDataURL(file);
    });
  });
</script>
</html>
