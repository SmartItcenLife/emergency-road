<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>게시글</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body { background-color: #ffffff; color: #1f2937; }

    .page-container {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .top-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: white;
      border-bottom: 1px solid #f0f0f0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .post-body { padding: 20px 16px; }

    .post-topic {
      display: inline-flex;
      align-items: center;
      height: 24px;
      padding: 0 10px;
      border-radius: 999px;
      background-color: #eaf3ff;
      color: #2563eb;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .post-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .author-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .author-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background-color: #e8f0fe;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0d6efd;
      flex-shrink: 0;
      overflow: hidden;
    }

    .author-name { font-weight: 700; font-size: 14px; }
    .author-meta { font-size: 13px; color: #9ca3af; }

    .post-content-box {
      background-color: #f9fafb;
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.75;
      color: #374151;
      margin-bottom: 16px;
    }

    .post-image {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      margin-bottom: 8px;
    }

    .action-bar {
      display: flex;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      margin: 0 16px 16px;
    }

    .action-bar-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 0;
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      border: none;
      background: none;
      cursor: pointer;
    }

    .action-bar-item.liked { color: #ef4444; }

    .action-bar-divider {
      width: 1px;
      background-color: #e5e7eb;
      margin: 8px 0;
    }

    .comment-section { padding: 0 16px; }

    .comment-header {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .comment-count { color: #0d6efd; }

    .comment-card {
      padding: 14px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .comment-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: #e8f0fe;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0d6efd;
      flex-shrink: 0;
      overflow: hidden;
    }

    .comment-name { font-weight: 700; font-size: 14px; }
    .comment-time { font-size: 12px; color: #9ca3af; }

    .comment-content {
      font-size: 14px;
      color: #374151;
      line-height: 1.6;
      margin: 6px 0;
    }

    .comment-like-btn {
      background: none;
      border: none;
      font-size: 13px;
      color: #9ca3af;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .comment-like-btn.liked { color: #ef4444; }

    .more-btn {
      background: none;
      border: none;
      color: #9ca3af;
      padding: 0;
      cursor: pointer;
    }

    .comment-input-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: white;
      border-top: 1px solid #f0f0f0;
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .comment-input {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      outline: none;
    }

    .comment-submit-btn {
      height: 40px;
      min-width: 52px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 14px;
    }
  </style>
</head>

<body>
<div class="page-container">

  <!-- 상단 헤더 -->
  <div class="top-header">
    <a th:href="@{/hospitals/{hpid}/posts(hpid=${hpid})}" class="text-dark text-decoration-none">
      <i class="bi bi-chevron-left fs-5"></i>
    </a>
    <span class="fw-bold">게시글</span>

    <!-- 수정/삭제/관리자 드롭다운 -->
    <div th:if="${session.loginUser != null && (session.loginUser == post.userId || session.loginRole == 'ADMIN')}">
      <div class="dropdown">
        <button class="more-btn" data-bs-toggle="dropdown">
          <i class="bi bi-three-dots fs-5"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          <li th:if="${session.loginUser == post.userId}">
            <a class="dropdown-item"
               th:href="@{/hospitals/{hpid}/posts/{postId}/edit(hpid=${hpid}, postId=${post.id})}">수정</a>
          </li>
          <li th:if="${session.loginUser == post.userId}">
            <form th:action="@{/hospitals/{hpid}/posts/{postId}/delete(hpid=${hpid}, postId=${post.id})}"
                  method="post">
              <button type="submit" class="dropdown-item text-danger"
                      onclick="return confirm('삭제하시겠습니까?')">삭제</button>
            </form>
          </li>
          <li th:if="${session.loginRole == 'ADMIN'}">
            <form th:action="@{/hospitals/{hpid}/posts/{postId}/delete(hpid=${hpid}, postId=${post.id})}"
                  method="post">
              <button type="submit" class="dropdown-item text-danger"
                      onclick="return confirm('[관리자] 삭제하시겠습니까?')">관리자 삭제</button>
            </form>
          </li>
        </ul>
      </div>
    </div>
    <div th:if="${session.loginUser == null || (session.loginUser != post.userId && session.loginRole != 'ADMIN')}">
      <i class="bi bi-three-dots fs-5 text-white"></i>
    </div>
  </div>

  <!-- 게시글 본문 -->
  <div class="post-body">
    <span class="post-topic">게시글</span>
    <div class="post-title" th:text="${post.title}"></div>

    <!-- 작성자 정보 -->
    <div class="author-row">
      <div class="author-avatar">
        <img th:if="${post.profileImageUrl != null}"
             th:src="${post.profileImageUrl}"
             style="width: 100%; height: 100%; object-fit: cover;">
        <i th:if="${post.profileImageUrl == null}" class="bi bi-person-fill fs-5"></i>
      </div>
      <div>
        <div class="author-name" th:text="${post.nickname}"></div>
        <div class="author-meta d-flex gap-2">
          <span th:text="${#temporals.format(post.createdAt, 'YY.MM.dd HH:mm')}"></span>
          <span>· 댓글 <span th:text="${post.commentCount}"></span></span>
          <span>· 공감 <span th:text="${post.recommendCount}"></span></span>
        </div>
      </div>
    </div>

    <div class="post-content-box">
      <!-- 내용 -->
      <p th:text="${post.content}" style="white-space: pre-line; margin-bottom: 0;"></p>

      <!-- 이미지 -->
      <div th:if="${post.imageUrls != null && !post.imageUrls.isEmpty()}" class="mt-3">
        <img th:each="imageUrl : ${post.imageUrls}"
             th:src="${imageUrl}" class="post-image">
      </div>
    </div>
  </div>

  <!-- 공감/댓글 액션 바 -->
  <div class="action-bar">
    <form th:action="@{/hospitals/{hpid}/posts/{postId}/like(hpid=${hpid}, postId=${post.id})}"
          method="post" style="flex: 1;">
      <button type="submit"
              class="action-bar-item w-100"
              th:classappend="${isLiked} ? ' liked'"
              th:disabled="${session.loginUser == null}">
        <i th:class="${isLiked} ? 'bi bi-heart-fill' : 'bi bi-heart'"></i>
        <span>공감 <span th:text="${likeCount}"></span></span>
      </button>
    </form>
    <div class="action-bar-divider"></div>
    <div class="action-bar-item">
      <i class="bi bi-chat"></i>
      <span>댓글 <span th:text="${#lists.size(comments)}"></span></span>
    </div>
  </div>

  <!-- 게시글 신고 -->
  <div th:if="${session.loginUser != null && session.loginUser != post.userId}"
       class="px-4 mb-3">
    <form th:action="@{/hospitals/{hpid}/posts/{postId}/report(hpid=${hpid}, postId=${post.id})}"
          method="post" class="d-flex gap-2">
      <input type="hidden" name="targetType" value="POST">
      <select name="reason" required class="form-select form-select-sm" style="border-radius: 10px;">
        <option value="">신고 사유 선택</option>
        <option value="스팸 홍보/도배">스팸 홍보/도배</option>
        <option value="욕설/혐오/차별적 표현">욕설/혐오/차별적 표현</option>
        <option value="거짓/허위 정보">거짓/허위 정보</option>
        <option value="기타 부적절한 내용">기타 부적절한 내용</option>
      </select>
      <button type="submit" class="btn btn-sm btn-outline-danger"
              onclick="return confirm('이 내용으로 신고하시겠습니까?')" style="white-space: nowrap;">
        <i class="bi bi-flag"></i> 신고
      </button>
    </form>
  </div>

  <!-- 댓글 섹션 -->
  <div class="comment-section">
    <div th:if="${comments.isEmpty()}" class="text-center py-4 text-secondary">
      <p>아직 댓글이 없습니다.</p>
    </div>

    <div th:each="comment : ${comments}" class="comment-card">
      <div class="d-flex gap-2">

        <!-- 댓글 프로필 -->
        <div class="comment-avatar flex-shrink-0">
          <img th:if="${comment.profileImageUrl != null}"
               th:src="${comment.profileImageUrl}"
               style="width: 100%; height: 100%; object-fit: cover;">
          <i th:if="${comment.profileImageUrl == null}" class="bi bi-person-fill"></i>
        </div>

        <!-- 내용 -->
        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
              <span class="comment-name" th:text="${comment.nickname}"></span>
              <span class="comment-time"
                    th:text="${#temporals.format(comment.createdAt, 'MM.dd HH:mm')}"></span>
            </div>

            <!-- 수정/삭제/관리자 드롭다운 -->
            <div th:if="${session.loginUser != null && (session.loginUser == comment.userId || session.loginRole == 'ADMIN')}">
              <div class="dropdown">
                <button class="more-btn" data-bs-toggle="dropdown">
                  <i class="bi bi-three-dots"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                  <li th:if="${session.loginUser == comment.userId}">
                    <button class="dropdown-item" type="button"
                            th:onclick="|toggleEditForm('edit-form-' + ${comment.id})|">수정</button>
                  </li>
                  <li th:if="${session.loginUser == comment.userId}">
                    <form th:action="@{/hospitals/{hpid}/posts/{postId}/comments/{commentId}/delete(hpid=${hpid}, postId=${post.id}, commentId=${comment.id})}"
                          method="post">
                      <button type="submit" class="dropdown-item text-danger"
                              onclick="return confirm('삭제하시겠습니까?')">삭제</button>
                    </form>
                  </li>
                  <li th:if="${session.loginRole == 'ADMIN'}">
                    <form th:action="@{/hospitals/{hpid}/posts/{postId}/comments/{commentId}/delete(hpid=${hpid}, postId=${post.id}, commentId=${comment.id})}"
                          method="post">
                      <button type="submit" class="dropdown-item text-danger"
                              onclick="return confirm('[관리자] 삭제하시겠습니까?')">관리자 삭제</button>
                    </form>
                  </li>
                </ul>
              </div>
            </div>
          </div>

          <p class="comment-content" th:text="${comment.content}"></p>

          <!-- 댓글 수정 폼 -->
          <div th:id="'edit-form-' + ${comment.id}" style="display: none;" class="mb-2">
            <form th:action="@{/hospitals/{hpid}/posts/{postId}/comments/{commentId}/edit(hpid=${hpid}, postId=${post.id}, commentId=${comment.id})}"
                  method="post" class="d-flex gap-2">
              <input type="text" name="content" th:value="${comment.content}"
                     class="form-control form-control-sm" style="border-radius: 10px;">
              <button type="submit" class="btn btn-primary btn-sm">저장</button>
            </form>
          </div>

          <!-- 댓글 좋아요 + 신고 -->
          <div class="d-flex align-items-center justify-content-between">
            <form th:action="@{/hospitals/{hpid}/posts/{postId}/comments/{commentId}/like(hpid=${hpid}, postId=${post.id}, commentId=${comment.id})}"
                  method="post">
              <button type="submit"
                      class="comment-like-btn"
                      th:classappend="${comment.liked} ? ' liked'"
                      th:disabled="${session.loginUser == null}">
                <i th:class="${comment.liked} ? 'bi bi-heart-fill' : 'bi bi-heart'"></i>
                <span th:text="${comment.likeCount}"></span>
              </button>
            </form>

            <!-- 댓글 신고 (로그인 + 본인 아닐 때) -->
            <form th:if="${session.loginUser != null && session.loginUser != comment.userId}"
                  th:action="@{/hospitals/{hpid}/posts/{postId}/comments/{commentId}/report(hpid=${hpid}, postId=${post.id}, commentId=${comment.id})}"
                  method="post" class="d-flex gap-2">
              <input type="hidden" name="targetType" value="COMMENT">
              <select name="reason" required class="form-select form-select-sm" style="border-radius: 10px; width: 130px; font-size: 12px;">
                <option value="">사유 선택</option>
                <option value="스팸 홍보/도배">스팸 홍보/도배</option>
                <option value="욕설/혐오/차별">욕설/혐오/차별</option>
                <option value="부적절한 내용">부적절한 내용</option>
              </select>
              <button type="submit" class="btn btn-sm btn-link text-danger p-0 m-0"
                      onclick="return confirm('이 댓글을 신고하시겠습니까?')">
                <i class="bi bi-flag"></i>
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>

</div>

<!-- 하단 댓글 입력 -->
<div th:if="${session.loginUser != null}" class="comment-input-bar">
  <form th:action="@{/hospitals/{hpid}/posts/{postId}/comments(hpid=${hpid}, postId=${post.id})}"
        method="post" class="d-flex gap-2 w-100 align-items-center">
    <input type="text" name="content" class="comment-input" placeholder="댓글을 입력하세요" maxlength="500">
    <button type="submit" class="btn btn-primary comment-submit-btn">등록</button>
  </form>
</div>

<div th:if="${session.loginUser == null}" class="comment-input-bar">
  <a th:href="@{/login}" class="btn btn-outline-primary w-100" style="border-radius: 20px;">
    로그인 후 댓글을 작성할 수 있습니다
  </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleEditForm(id) {
    const form = document.getElementById(id);
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }
</script>
</body>
</html>
