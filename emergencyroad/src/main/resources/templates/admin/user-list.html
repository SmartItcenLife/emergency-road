<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>관리자 - 회원 목록</title>
    <style>
        table { width: 80%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h1>회원 관리</h1>

<table>
    <thead>
    <tr>
        <th>번호(ID)</th>
        <th>아이디</th>
        <th>닉네임</th>
        <th>권한</th>
        <th>가입일</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${userList}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.username}">testUser</td>
        <td th:text="${user.nickname}">홍길동</td>
        <td th:text="${user.role}">USER</td>
        <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-11</td>
        <td>
            <button>탈퇴</button>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
