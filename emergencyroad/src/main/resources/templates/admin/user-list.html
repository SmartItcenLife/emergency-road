    <h2>관리자 시스템</h2>

</div>

<h1>회원 관리</h1>

<table>
    <thead>
    <tr>
        <th>번호(ID)</th>
        <th>아이디</th>
        <th>닉네임</th>
        <th>권한</th>
        <th>가입일</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${userList}">
<!--        <td th:text="${user.id}">1</td>-->
        <td th:text="${user.userName}">testUser</td>
        <td th:text="${user.nickname}">홍길동</td>
        <td th:text="${user.role}">USER</td>
        <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-11</td>
        <td th:text="${user.}">신고 여부</td>
        <td>
            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"
                  onsubmit="return confirm('정말 이 회원을 강제 탈퇴 처리하시겠습니까?');">
                <button type="submit" style="color: red; cursor: pointer;">탈퇴</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
