<body>

<div class="sidebar">
    <h2>관리자 시스템</h2>
    <a th:href="@{/admin}">📊 대시보드 (메인)</a>
    <a th:href="@{/admin/users}">👥 회원 관리</a>
    <a th:href="@{/admin/posts}" style="background-color: #494e53; color: white;">📝 커뮤니티 관리</a>
    <a href="#">💬 실시간 채팅 관리</a>
</div>

<div class="main-content">
    <h1>커뮤니티 (게시글) 관리</h1>

    <table>
        <thead>
        <tr>
            <th>글 번호</th>
            <th>병원 이름</th>
            <th>글 제목</th>
            <th>작성자</th>
            <th>작성일</th>
            <th>상태</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${postList}">
            <td th:text="${post.id}">1</td>
            <td th:text="${post.hospitalName}">서울대학교병원</td>
            <td th:text="${post.title}">병상 문의드립니다.</td>
            <td th:text="${post.authorName}">홍길동</td>
            <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-05-11</td>

            <td>
                <span th:if="${!post.isDeleted}">정상</span>
                <span th:if="${post.isDeleted}" class="deleted-text">삭제됨</span>
            </td>

            <td>
                <button th:if="${!post.isDeleted}">강제 삭제</button>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
