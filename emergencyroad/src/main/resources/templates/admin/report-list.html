<body>

<div class="sidebar">
    <h2>관리자 시스템</h2>
    <a th:href="@{/admin}">📊 대시보드 (메인)</a>
</div>

<h1>🚨 신고 관리 센터</h1>

<div class="report-section">
    <h2>📌 신고된 게시글 목록</h2>
    <table>
        <thead>
        <tr>
            <th>신고번호</th>
            <th>신고자</th>
            <th>대상 게시글(ID)</th>
            <th>신고사유</th>
            <th>신고일시</th>
            <th>상태</th> <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="report : ${reportList}" th:if="${report.targetType.name() == 'POST'}">
            <td th:text="${report.id}">1</td>
            <td th:text="${report.reporterNickname}">신고왕</td>
            <td>
                <a class="post-link"
                   th:href="@{/hospitals/{hpid}/posts/{postId}(hpid=${report.hpid}, postId=${report.targetId})}"
                   th:text="'게시글 #' + ${report.targetId}">글 보러가기</a>
            </td>
            <td th:text="${report.reason}" style="font-weight: bold; color: darkred;"></td>
            <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}"></td>

            <td>
                <span th:if="${report.isTargetDeleted}" style="color: gray; font-weight: bold;">🔒 숨김 처리됨</span>
                <span th:if="${!report.isTargetDeleted}" style="color: green;">✅ 정상 게시 중</span>
            </td>

            <td>
                <form th:action="@{/admin/reports/{reportId}/delete(reportId=${report.id})}" method="post" th:if="${!report.isTargetDeleted}">
                    <button type="submit" onclick="return confirm('정말로 강제 삭제하시겠습니까?')" style="color: red;">강제삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div class="report-section">
    <h2>💬 신고된 댓글 목록</h2>
    <table>
        <thead>
        <tr>
            <th>신고번호</th>
            <th>신고자</th>
            <th>대상 댓글(ID)</th>
            <th>신고일시</th>
            <th>상태</th> <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="report : ${reportList}" th:if="${report.targetType.name() == 'COMMENT'}">
            <td th:text="${report.id}">2</td>
            <td th:text="${report.reporterNickname}">정의사도</td>
            <td>
                <span th:text="'댓글 #' + ${report.targetId}">댓글 번호</span>
            </td>
            <td th:text="${#temporals.format(report.createdAt, 'yyyy-MM-dd HH:mm')}"></td>

            <td>
                <span th:if="${report.isTargetDeleted}" style="color: gray; font-weight: bold;">🔒 숨김 처리됨</span>
                <span th:if="${!report.isTargetDeleted}" style="color: green;">✅ 정상 게시 중</span>
            </td>

            <td>
                <form th:action="@{/admin/reports/{reportId}/delete(reportId=${report.id})}" method="post" th:if="${!report.isTargetDeleted}">
                    <button type="submit" onclick="return confirm('정말로 강제 삭제하시겠습니까?')" style="color: red;">강제삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
