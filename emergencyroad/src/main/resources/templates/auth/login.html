<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
</head>
<body>

<h2>로그인</h2>

<!-- 에러 메시지 -->
<div th:if="${errorMessage}">
  <p th:text="${errorMessage}" style="color: red;"></p>
</div>

<form th:action="@{/login}" th:object="${loginRequestDto}" method="post">

  <!-- 아이디 -->
  <div>
    <label>아이디</label>
    <input type="text" th:field="*{userName}" placeholder="아이디를 입력해주세요">
    <p th:if="${#fields.hasErrors('userName')}"
       th:errors="*{userName}"
       style="color: red;"></p>
  </div>

  <!-- 비밀번호 -->
  <div>
    <label>비밀번호</label>
    <input type="password" th:field="*{password}" placeholder="비밀번호를 입력해주세요">
    <p th:if="${#fields.hasErrors('password')}"
       th:errors="*{password}"
       style="color: red;"></p>
  </div>

  <button type="submit">로그인</button>

</form>

<a th:href="@{/signup}">아직 계정이 없으신가요? 회원가입</a>

</body>
</html>
