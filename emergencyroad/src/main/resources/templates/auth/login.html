<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인</title>

  <!-- Bootstrap CSS -->
  <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
  >

  <!-- 내 CSS -->
  <link rel="stylesheet" th:href="@{/css/community.css}">

  <style>
    body {
      background-color: white;
    }

    .login-container {
      max-width: 430px;
    }

    .login-card {
      border-radius: 20px;
    }

    /* 로그인 / 카카오 로그인 / 회원가입 버튼 공통 정렬 */
    .login-button,
    .kakao-login-btn {
      height: 52px;
      font-weight: 700;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 카카오 로그인 버튼 */
    .kakao-login-btn {
      gap: 12px;

      background-color: #FEE500;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      border: none;
    }

    .kakao-login-btn:hover {
      background-color: #FDDC00;
      color: #000;
      text-decoration: none;
    }

    /* 카카오 아이콘 */
    .kakao-icon {
      width: 22px;
      height: 22px;
      display: block;
      object-fit: contain;
    }
  </style>
</head>

<body>

<main class="container min-vh-100 d-flex justify-content-center align-items-center py-5">
  <section class="login-container w-100">

    <!-- 상단 제목 -->
    <div class="mb-5">
      <h1 class="fw-bold mb-3">로그인</h1>
      <p class="text-secondary mb-0">커뮤니티에 다시 오신 것을 환영합니다!</p>
    </div>

    <!-- 에러 메시지 -->
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
      <p th:text="${errorMessage}" class="mb-0"></p>
    </div>

    <!-- 로그인 폼 -->
    <form th:action="@{/login}" th:object="${loginRequestDto}" method="post">

      <div class="login-card bg-white border shadow-sm p-4 mb-4">

        <!-- 아이디 -->
        <div class="mb-4">
          <label for="userName" class="form-label fw-bold">아이디</label>
          <input
              type="text"
              id="userName"
              th:field="*{userName}"
              class="form-control form-control-lg"
              th:classappend="${#fields.hasErrors('userName')} ? 'is-invalid'"
              placeholder="아이디를 입력해주세요"
          >

          <div class="form-text">
            4~20자의 영문, 숫자 조합
          </div>

          <p
              th:if="${#fields.hasErrors('userName')}"
              th:errors="*{userName}"
              class="invalid-feedback d-block mb-0"
          ></p>
        </div>

        <hr class="my-4">

        <!-- 비밀번호 -->
        <div>
          <label for="password" class="form-label fw-bold">비밀번호</label>
          <input
              type="password"
              id="password"
              th:field="*{password}"
              class="form-control form-control-lg"
              th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
              placeholder="비밀번호를 입력해주세요"
          >

          <div class="form-text">
            8~20자의 영문, 숫자, 특수문자 조합
          </div>

          <p
              th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"
              class="invalid-feedback d-block mb-0"
          ></p>
        </div>

      </div>

      <!-- 로그인 버튼 -->
      <button type="submit" class="btn btn-primary w-100 login-button mb-3">
        로그인
      </button>

    </form>

    <!-- 카카오 로그인 버튼 -->
    <a th:href="${kakaoLoginUrl}" class="kakao-login-btn w-100 mb-2">
      <img th:src="@{/images/kakao_icon_fixed.svg}" alt="말풍선" class="kakao-icon">
      <span>카카오 로그인</span>
    </a>

    <!-- 회원가입 구분선 -->
    <div class="d-flex align-items-center gap-3 mb-2">
      <hr class="flex-grow-1">
      <span class="text-secondary small">아직 계정이 없으신가요?</span>
      <hr class="flex-grow-1">
    </div>

    <!-- 회원가입 버튼 -->
    <a th:href="@{/signup}" class="btn btn-outline-primary w-100 login-button">
      회원가입
    </a>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
