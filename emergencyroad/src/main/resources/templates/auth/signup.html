<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>emergency-route signup</title>
</head>
<body>
<h2>회원가입</h2>

<!-- getMapping, Post 매핑 둘 다 넘어옴. 값은 회원가입 화면에서 넘어가고 이후로 회원가입이 에러없이 넘어가면 -->
<!-- redirect로 /login을 호출함. -->

<!-- 중복 확인 에러 메시지 -->
<div th:if="${errorMessage}">
  <p th:text="${errorMessage}" style="color: red"></p>
</div>

<!--회원 가입 화면-->
<form th:action="@{/signup}" th:object="${signupRequestDto}" method="post">

  <!-- 아이디 -->
  <div>
    <label>아이디
      <input type="text" th:field="*{userName}" placeholder="영문과 숫자 조합으로 6~20자">
    </label>
    <p th:if="${#fields.hasErrors('userName')}"
      th:errors="*{userName}"
       style="color: red">
    </p>
  </div>

  <!-- 비밀번호 -->
  <div>
    <label>비밀번호
      <input type="password" th:field="*{password}" placeholder="영문,숫자,특수문자로 8자 이상">
    </label>
    <p th:if="${#fields.hasErrors('password')}"
       th:errors="*{password}"
       style="color:red;"></p>
  </div>

  <!-- 닉네임 -->
  <div>
    <label>닉네임</label>
    <input type="text" th:field="*{nickname}" placeholder="20자 이내">
    <p th:if="${#fields.hasErrors('nickname')}"
       th:errors="*{nickname}"
       style="color: red;"></p>
  </div>

  <!-- 이메일 -->
  <div>
    <label>이메일</label>
    <input type="email" th:field="*{email}" placeholder="example@email.com">
    <p th:if="${#fields.hasErrors('email')}"
       th:errors="*{email}"
       style="color: red;"></p>
  </div>

  <!-- 프로필 이미지 -->
  <div>
    <label>프로필 이미지 (선택)</label>
    <input type="file" accept="image/*" id="profileImage">
    <input type="hidden" th:field="*{profileImageUrl}">
  </div>

  <button type="submit">회원가입</button>

</form>

<a th:href="@{/login}">이미 계정이 있으신가요? 로그인</a>

</body>
</html>
