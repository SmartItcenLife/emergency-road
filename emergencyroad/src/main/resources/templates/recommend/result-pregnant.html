<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임산부 응급 추천 결과</title>

    <style>
        body {
            margin: 0;
            background: #fdfafb;
            font-family: Arial, sans-serif;
            color: #1f2937;
        }

        .page {
            width: 100%;
            min-height: 100vh;
            background: #fffafa;
            padding: 14px;
            box-sizing: border-box;
        }

        @media (min-width: 768px) {
            .page {
                max-width: 430px;
                margin: 0 auto;
            }
        }

        .header {
            margin-bottom: 16px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px;
        }

        .location {
            font-size: 13px;
            color: #db2777;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 18px 0 10px;
        }

        .hospital-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hospital-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            background: #ffffff;
            border: 1px solid #fce7f3;
            border-radius: 8px;
        }


        .hospital-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .hospital-icon {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            background: #fdf2f8;
            color: #db2777;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex: 0 0 auto;
        }


        .hospital-info {
            min-width: 0;
            flex: 1;
            padding-right: 4px;
        }


        .hospital-name {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
            color: #111827;

            display: block;
            word-break: keep-all;
            overflow-wrap: break-word;
            white-space: normal;
        }

        .hospital-meta {
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b7280;
            flex-wrap: wrap;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge-free {
            background: #dcfce7;
            color: #16a34a;
        }

        .badge-busy {
            background: #fee2e2;
            color: #dc2626;
        }

        .badge-unknown {
            background: #f3f4f6;
            color: #6b7280;
        }

        .hospital-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
        }

        .hospital-status {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        /* Donut Graph */
        .donut {
            --rate: 0;
            --donut-color: #f472b6;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: conic-gradient(var(--donut-color) calc(var(--rate) * 1%), #fce7f3 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .donut-free {
            --donut-color: #22c55e;
        }

        .donut-normal {
            --donut-color: #facc15;
        }

        .donut-busy {
            --donut-color: #ef4444;
        }

        .donut-unknown {
            --donut-color: #9ca3af;
        }

        .donut::before {
            content: "";
            position: absolute;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #ffffff;
        }

        .donut span {
            position: relative;
            font-size: 11px;
            font-weight: 800;
            color: #db2777;
        }

        .bed-text {
            font-size: 10px;
            color: #9ca3af;
            text-align: center;
            white-space: nowrap;
        }

        .hospital-actions {
            display: flex;
            flex-direction: row;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        .call-button, .route-button, .community-button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #fff1f2;
            color: #db2777;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border: 1px solid #fecdd3;
            flex: 0 0 auto;
        }

        .icon-img {
            width: 14px;
            height: 14px;
        }

        .call-button-disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .detail-toggle {
            width: 20px;
            height: 70px;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            flex: 0 0 auto;
        }

        .detail-toggle-icon {
            width: 8px;
            height: 14px;
            opacity: 0.55;
            transition: transform 0.2s ease;
        }

        .detail-toggle-open .detail-toggle-icon {
            transform: rotate(90deg);
            opacity: 1;
        }

        /* Detail Panel */
        .hospital-detail-wrapper {
            margin-top: -4px;
            margin-bottom: 10px;
        }

        .hospital-detail-panel {
            padding: 12px;
            background: #ffffff;
            border: 1px solid #fce7f3;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
        }

        .detail-section + .detail-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #fff1f2;
        }

        .detail-title {
            margin: 0 0 10px;
            font-size: 13px;
            font-weight: 800;
            color: #db2777;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 12px;
        }

        .detail-label {
            color: #9ca3af;
        }

        .detail-value {
            font-weight: 700;
            color: #1f2937;
        }

        .detail-resource-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .detail-resource {
            padding: 10px;
            border: 1px solid #fce7f3;
            border-radius: 10px;
            background: #fffafa;
        }

        .detail-resource-name {
            display: block;
            margin-bottom: 4px;
            font-size: 11px;
            color: #6b7280;
        }

        .detail-resource-value {
            font-size: 13px;
            font-weight: 800;
            color: #111827;
        }

        .detail-capability-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .detail-capability {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            font-size: 12px;
        }

        .capability-badge {
            padding: 3px 7px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
        }

        .capability-available {
            background: #dcfce7;
            color: #16a34a;
        }

        .capability-unavailable {
            background: #fee2e2;
            color: #dc2626;
        }

        .capability-unknown {
            background: #e5e7eb;
            color: #6b7280;
        }

        /*.tag-wrapper { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 5px; }*/
        .tag-badge {
            background: #fdf2f8;
            color: #db2777;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid #fbcfe8;
        }

        .detail-loading {
            padding: 15px;
            font-size: 12px;
            color: #db2777;
            text-align: center;
            font-weight: 600;
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: #6b7280;
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
    </style>
</head>

<body>
<div class="page">
    <header class="header">
        <h1 class="title">임산부 응급 추천 결과</h1>
        <div class="location">
            <span th:text="${locationProvided ? '현재 위치' : '기본 위치'}">현재 위치</span> :
            <span th:text="${displayLocation}"></span>
        </div>
    </header>

    <section>
        <h2 class="section-title">추천 병원 TOP 3</h2>

        <div class="empty" th:if="${#lists.isEmpty(rankings)}">
            추천 가능한 병원이 없습니다.
        </div>

        <div class="hospital-list" th:unless="${#lists.isEmpty(rankings)}">
            <article class="hospital-card" th:each="hospital, iter : ${rankings}"
                     th:style="${iter.index == 0} ? 'border:2px solid #2563eb;background:#eff6ff;' : ''">

                <div class="hospital-left">
                    <div class="hospital-icon">P</div>
                    <div class="hospital-info">
                        <div style="margin-bottom:4px;">
                            <span class="badge" style="background:#2563eb;color:white;"
                                  th:text="|TOP ${iter.index + 1}|">TOP 1</span>
                        </div>
                        <div class="hospital-name" th:text="${hospital.hospitalName}">병원명</div>
                        <div class="hospital-meta">
                            <span th:text="${hospital.distance != null ? #numbers.formatDecimal(hospital.distance, 1, 1) + 'km' : '-'}">0.0km</span>
                            <span>•</span>
                            <span th:text="${hospital.duration != null ? T(java.lang.Math).round(hospital.duration) + '분' : '-'}">0분</span>
                            <!-- trim()을 추가하여 공백 문제 해결 -->
                            <span class="badge"
                                  th:classappend="${hospital.deliveryAvailable != null and #strings.trim(hospital.deliveryAvailable) == 'Y'} ? 'badge-free' : 'badge-busy'"
                                  th:text="${hospital.deliveryAvailable != null and #strings.trim(hospital.deliveryAvailable) == 'Y' ? '분만 가능' : '분만 불가'}">
        가부
    </span>
                        </div>
                        <div class="tag-wrapper" th:if="${hospital.tags != null}">
                            <small th:each="tag : ${#strings.arraySplit(hospital.tags, '|')}" class="tag-badge"
                                   th:text="${tag}">태그</small>
                        </div>
                    </div>
                </div>

                <div class="hospital-right">
                    <div class="hospital-status">
                        <!-- 도넛 그래프 (가용 NICU 병상 기준 예시) -->
                        <div class="donut donut-normal" th:style="|--rate: 50|">
                            <span>NICU</span>
                        </div>
                        <div class="bed-text">
                            <div th:text="|NICU ${hospital.nicuBedCount ?: 0}병상|">NICU 0병상</div>
                            <div th:text="|분만실 ${hospital.isDeliveryRoomAvailable == 'Y' ? '가능' : '불가'}|">분만실 불가</div>
                        </div>

                        <div class="hospital-actions">
                            <a class="call-button"
                               th:href="${hospital.emergencyPhone != null ? 'tel:' + hospital.emergencyPhone : '#'}"
                               th:classappend="${hospital.emergencyPhone == null} ? ' call-button-disabled'">
                                <img th:src="@{/images/phone.svg}" class="icon-img" alt="전화">
                            </a>
                            <a class="route-button" href="#" th:data-hospital-name="${hospital.hospitalName}"
                               th:data-lat="${hospital.hospitalLatitude}" th:data-lon="${hospital.hospitalLongitude}">
                                <img th:src="@{/images/finder.svg}" class="icon-img" alt="길찾기">
                            </a>
                            <a class="community-button" th:href="@{/community(hpid=${hospital.hpid})}">
                                <img th:src="@{/images/community.svg}" class="icon-img" alt="톡">
                            </a>
                        </div>
                    </div>

                    <button type="button" class="detail-toggle" th:data-hpid="${hospital.hpid}">
                        <img th:src="@{/images/angle-brackets.png}" class="detail-toggle-icon" alt="더보기">
                    </button>
                </div>
            </article>
        </div>
    </section>
</div>

<script th:inline="javascript">
    const userLat = [[${userLat}]];
    const userLon = [[${userLon}]];

    document.querySelectorAll(".detail-toggle").forEach(button => {
        button.addEventListener("click", function () {
            const hpid = this.dataset.hpid;
            const card = this.closest(".hospital-card");
            const currentDetail = card.nextElementSibling;

            if (currentDetail && currentDetail.classList.contains("hospital-detail-wrapper")) {
                currentDetail.remove();
                this.classList.remove("detail-toggle-open");
                return;
            }

            document.querySelectorAll(".hospital-detail-wrapper").forEach(el => el.remove());
            document.querySelectorAll(".detail-toggle-open").forEach(btn => btn.classList.remove("detail-toggle-open"));
            this.classList.add("detail-toggle-open");

            const loading = document.createElement("div");
            loading.className = "hospital-detail-wrapper";
            loading.innerHTML = `<div class="detail-loading">상세 정보를 불러오는 중입니다...</div>`;
            card.insertAdjacentElement("afterend", loading);

            fetch(`/pregnant/hospitals/${hpid}/detail`)
                .then(res => res.json())
                .then(detail => {
                    console.log("🔥 DETAIL RAW RESPONSE:", detail);
                    loading.innerHTML = createPregnantDetailHtml(detail);
                })
                .catch(() => {
                    loading.innerHTML = `<div class="detail-loading" style="color:red;">정보를 불러오지 못했습니다.</div>`;
                });
        });
    });

    function createPregnantDetailHtml(detail) {
        return `
        <div class="hospital-detail-panel">

            <!-- 1. 기본 정보 -->
            <div class="detail-section">
                <h3 class="detail-title">기본 정보</h3>
                ${createDetailRow("주소", detail.address)}
                ${createDetailRow("응급실 번호", detail.emergencyPhone)}
                ${createDetailRow("대표전화", detail.phone)}
            </div>

            <!-- 2. 실시간 자원 -->
            <div class="detail-section">
                <h3 class="detail-title">실시간 임산부 자원</h3>
                <div class="detail-resource-grid">

${createResourceItem("NICU 병상", detail.nicuBedCount, detail.nicuStandard)}
${createResourceItem("인큐베이터", detail.incubatorCount, detail.incubatorStandard)}
                                   </div>
            </div>

            <!-- 3. 기준 자원 -->
          <!--    <div class="detail-section">
                <h3 class="detail-title">기준 임산부 자원</h3>
                <div class="detail-resource-grid">

                    ${createResourceItem("분만실 기준", detail.deliveryRoomStandard)}
                    ${createResourceItem("NICU 기준", detail.nicuStandard)}
                    ${createResourceItem("인공호흡기 기준", detail.ventilatorStandard)}
                    ${createResourceItem("인큐베이터 기준", detail.incubatorStandard)}
                </div>
            </div>
 -->
            <!-- 4. 진료 가능 여부 -->
            <div class="detail-section">
                <h3 class="detail-title">진료 가능 여부</h3>
                <div class="detail-capability-list">

                    ${createCapabilityItem("분만실 사용 가능", detail.isDeliveryRoomAvailable)}
                    ${createCapabilityItem("인큐베이터 사용 가능", detail.incubatorAvailable)}
                    ${createCapabilityItem("조산아 인공호흡기 사용 가능", detail.prematureVentilatorAvailable)}
                    ${createCapabilityItem("NICU 치료", detail.nicuAvailable)}
                    ${createCapabilityItem("응급 분만 가능", detail.deliveryAvailable)}
                    ${createCapabilityItem("산과 수술", detail.obstetricSurgeryAvailable)}
                    ${createCapabilityItem("부인과 수술", detail.gynecologySurgeryAvailable)}
                    ${createCapabilityItem("응급 투석", detail.emergencyDialysisAvailable)}
                </div>
            </div>

            <!-- 5. 갱신 시간 -->
            <div class="detail-section">
                <h3 class="detail-title">갱신 시간</h3>
                ${createDetailRow("실시간 정보", formatDateTime(detail.realtimeRecordedAt))}
                ${createDetailRow("기준 정보", formatDateTime(detail.standardRecordedAt))}
            </div>

        </div>
    `;
    }

    function createDetailRow(label, value) {
        return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${value || '-'}</span></div>`;
    }

    function createResourceItem(label, current, standard) {
        return `
        <div class="detail-resource">
            <span class="detail-resource-name">${label}</span>
            <span class="detail-resource-value">
                ${formatCount(current, standard)}
            </span>
        </div>
    `;
    }

    function formatCount(current, standard) {
        const c = current ?? "-";
        const s = standard ?? "";

        if (s === "" || s === "-") return c;
        return `${c} / ${s}`;
    }

    function formatDateTime(v) {
        return v ? v.replace("T", " ").slice(0, 16) : "-";
    }

    document.querySelectorAll(".route-button").forEach(btn => {
        btn.addEventListener("click", function (e) {
            e.preventDefault();
            const {hospitalName, lat, lon} = this.dataset;
            const url = `https://map.kakao.com/link/by/car/${encodeURIComponent("현재 위치")},${userLat},${userLon}/${encodeURIComponent(hospitalName)},${lat},${lon}`;
            window.open(url, "_blank");
        });
    });

    // 가능 여부를 표시하는 행을 만드는 함수
    function createCapabilityItem(label, value, message) {
        const status = normalizeAvailability(value);
        const messageHtml = message ? `<div class="detail-message">${escapeHtml(message)}</div>` : "";

        return `
            <div>
                <div class="detail-capability">
                    <span>${escapeHtml(label)}</span>
                    <span class="capability-badge ${status.className}">${escapeHtml(status.label)}</span>
                </div>
                ${messageHtml}
            </div>
        `;
    }


    function normalizeAvailability(value) {
        const v = String(value).trim().toUpperCase();

        if (v === "Y" || v === "YES" || v === "TRUE" || v === "1" || v === "가능") {
            return { label: "가능", className: "capability-available" };
        }

        if (v === "N" || v === "NO" || v === "FALSE" || v === "0" || v === "불가") {
            return { label: "불가", className: "capability-unavailable" };
        }
        return { label: displayValue(value), className: "capability-unknown" };
    }

    // 빈 문자열을 "-" 로 표기
    function displayValue(value) {
        if (value === null || value === undefined || value === "") {
            return "-";
        }
        return value;
    }
    // 문자열을 HTML 로 바로 넣을 때 발생하는 문제를 방지하기 위한 함수.
    function escapeHtml(value) {
        return String(displayValue(value))
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
</body>
</html>
