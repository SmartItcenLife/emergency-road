<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>추천 병원 TOP3</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f6f8;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 18px;
            font-weight: bold;
        }

        .score {
            color: #e91e63;
            font-weight: bold;
            margin-top: 8px;
        }

        .info {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🤰 임산부 추천 병원 TOP3</h1>

    <!-- 카테고리 -->
    <p th:text="${category}"></p>

    <!-- 리스트 반복 -->
    <div th:each="item : ${rankings}" class="card">

        <div class="title" th:text="${item.hospitalName}">
            병원 이름
        </div>

        <div class="score">
            최종 점수 :
            <span th:text="${item.finalScore}">0</span>
        </div>

        <div class="info">
            거리 :
            <span th:text="${item.distance}">0</span> km
        </div>

        <div class="info">
            소요 시간 :
            <span th:text="${item.duration}">0</span> 분
        </div>

        <div class="info">
            병원 ID :
            <span th:text="${item.hpid}">id</span>
        </div>

    </div>

</div>

</body>
</html>
