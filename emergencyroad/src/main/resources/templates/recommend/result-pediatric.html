<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 추천 병원 TOP3</title>
    <style>
        /* 기존 CSS 스타일은 동일하므로 생략하지 말고 그대로 유지하세요 */
        body { margin: 0; background: #f5f7fb; font-family: Arial, sans-serif; color: #1f2937; }
        .page { width: 100%; min-height: 100vh; background: #f8fafc; padding: 14px; box-sizing: border-box; }
        @media (min-width: 768px) { .page { max-width: 430px; margin: 0 auto; } }
        .header { margin-bottom: 16px; }
        .title { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
        .location { font-size: 13px; color: #2563eb; }
        .section-title { font-size: 15px; font-weight: 700; margin: 18px 0 10px; }
        .hospital-list { display: flex; flex-direction: column; gap: 10px; }
        .hospital-card { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; }
        .hospital-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex:1; }
        .hospital-icon { width: 30px; height: 30px; border-radius: 7px; background: #e0f2fe; color: #0284c7; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex: 0 0 auto; }
        .hospital-info { min-width: 0; flex: 1; }
        .hospital-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
        .hospital-meta { margin-top: 5px; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; flex-wrap: wrap; }
        .badge { padding: 2px 6px; border-radius: 999px; font-size: 11px; font-weight: 700; }
        .badge-free { background: #dcfce7; color: #16a34a; }
        .badge-normal { background: #fef3c7; color: #d97706; }
        .badge-busy { background: #fee2e2; color: #dc2626; }
        .badge-unknown { background: #e5e7eb; color: #6b7280; }
        .hospital-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
        .call-button, .route-button, .community-button { width: 28px; height: 28px; border-radius: 50%; background: #eff6ff; color: #2563eb; display: flex; align-items: center; justify-content: center; text-decoration: none; border: 1px solid #bfdbfe; }
        .call-icon-img, .finder-icon-img, .community-icon-img { width: 14px; height: 14px; }
        .donut { --rate: 0; --donut-color: #9ca3af; width: 50px; height: 50px; border-radius: 50%; background: conic-gradient(var(--donut-color) calc(var(--rate) * 1%), #e5e7eb 0); display: flex; align-items: center; justify-content: center; position: relative; }
        .donut-free { --donut-color: #22c55e; }
        .donut-normal { --donut-color: #facc15; }
        .donut-busy { --donut-color: #ef4444; }
        .donut::before { content: ""; position: absolute; width: 35px; height: 35px; border-radius: 50%; background: #ffffff; }
        .donut span { position: relative; font-size: 11px; font-weight: 800; color: var(--donut-color); }
        .bed-text { font-size: 10px; color: #6b7280; text-align: center; white-space: nowrap; }
        .tag-badge { font-size: 10px; padding: 1px 5px; background: #f1f5f9; color: #475569; border-radius: 4px; margin-right: 3px; }
        .call-button-disabled { opacity: 0.4; pointer-events: none; }
        .detail-toggle { width: 20px; height: 70px; border: none; background: transparent; cursor: pointer; }
        .detail-toggle-icon { width: 8px; opacity: 0.5; }
    </style>
</head>
<body>
<div class="page">
    <header class="header">
        <!-- getDescription() 대신 name() 사용하거나 필드 직접 접근 시도 -->
        <h1 class="title" th:text="${category.name()} + ' 추천 TOP3'"></h1>
        <div class="location">
            <span th:text="${locationProvided} ? '현재 위치' : '기본 위치'">위치 정보</span> :
            <span th:text="${displayLocation}">내 주변</span>
        </div>
    </header>

    <section>
        <h2 class="section-title">추천 리스트</h2>

        <!-- rankings가 비어있을 때 처리 -->
        <div th:if="${#lists.isEmpty(rankings)}" style="padding: 20px; text-align: center; color: #6b7280;">
            추천할 수 있는 병원이 없습니다.
        </div>

        <div class="hospital-list" th:unless="${#lists.isEmpty(rankings)}">
            <article class="hospital-card" th:each="item : ${rankings}">
                <div class="hospital-left">
                    <div class="hospital-icon" th:style="${category.name() == 'PREGNANT'} ? 'background:#fce7f3; color:#db2777;' : ''">H</div>
                    <div class="hospital-info">
                        <div class="hospital-name" th:text="${item.hospitalName}">병원명</div>
                        <div class="hospital-meta">
                            <span th:text="${#numbers.formatDecimal(item.distance, 1, 1)} + 'km'">0.0km</span>
                            <span class="badge"
                                  th:classappend="${item.congestionLabel == '여유'} ? ' badge-free' : (${item.congestionLabel == '혼잡'} ? ' badge-busy' : ' badge-normal')"
                                  th:text="${item.congestionLabel}">상태</span>
                        </div>
                        <div style="margin-top: 4px;">
                            <span th:if="${item.tags != null}" th:each="tag : ${#strings.arraySplit(item.tags, '|')}"
                                  class="tag-badge" th:text="${tag}">태그</span>
                        </div>
                    </div>
                </div>

                <div class="hospital-right">
                    <div class="hospital-status">
                        <div class="donut"
                             th:classappend="${item.congestionLabel == '여유'} ? ' donut-free' : (${item.congestionLabel == '혼잡'} ? ' donut-busy' : ' donut-normal')"
                             th:style="|--rate: ${item.availableBedPercentage != null ? item.availableBedPercentage : 0}|">
                            <span th:text="${item.availableBedPercentage != null ? item.availableBedPercentage + '%' : '0%'}">0%</span>
                        </div>

                        <div class="bed-text">
                            <th:block th:if="${category.name() == 'PEDIATRIC'}">
                                가용 소아병상 <span th:text="${item.availablePediatricBedCount}">0</span>개
                            </th:block>
                            <th:block th:if="${category.name() == 'PREGNANT'}">
                                <span th:text="${item.deliveryAvailable} ? '분만 가능' : '확인불가'"></span>
                            </th:block>
                            <th:block th:if="${category.name() == 'GENERAL'}">
                                가용 응급병상 <span th:text="${item.availableBedCount}">0</span>개
                            </th:block>
                        </div>

                        <div class="hospital-actions" style="display: flex; gap: 4px; margin-top: 4px;">
                            <a class="call-button"
                               th:href="${item.emergencyPhone != null} ? 'tel:' + ${item.emergencyPhone} : '#'">
                                <img th:src="@{/images/phone.svg}" class="call-icon-img">
                            </a>
                            <a class="route-button" href="#"
                               th:data-hospital-name="${item.hospitalName}"
                               th:data-lat="${item.hospitalLatitude}"
                               th:data-lon="${item.hospitalLongitude}">>
                                <img th:src="@{/images/finder.svg}" class="finder-icon-img">
                            </a>
                        </div>
                    </div>
                    <button class="detail-toggle" th:data-hpid="${item.hpid}">
                        <img th:src="@{/images/angle-brackets.png}" class="detail-toggle-icon">
                    </button>
                </div>
            </article>
        </div>
    </section>
</div>

<script th:inline="javascript">
    const userLat = [[${userLat}]];
    const userLon = [[${userLon}]];

    document.querySelectorAll(".route-button").forEach(button => {
        button.addEventListener("click", e => {
            e.preventDefault();
            const url = `https://map.kakao.com/link/by/car/${encodeURIComponent('출발지')},${userLat},${userLon}/${encodeURIComponent(button.dataset.hospitalName)},${button.dataset.lat},${button.dataset.lon}`;
            window.open(url, "_blank");
        });
    });
</script>
</body>
</html>
